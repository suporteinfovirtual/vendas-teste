<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Ice Sorvetes - Consulta de Vendas</title>
    <meta name="description" content="Dashboard de consulta de vendas Best Ice Sorvetes em tempo real">
    <meta name="theme-color" content="#6ba3a3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Best Ice Vendas">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.0/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6ba3a3;
            --primary-dark: #5a8c8c;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --bg-light: #f9fafb;
            --bg-white: #ffffff;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --border-color: #e5e7eb;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #6ba3a3 0%, #5a8c8c 100%);
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
        }

        /* LOGIN STYLES */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #6ba3a3 0%, #5a8c8c 100%);
            z-index: 1000;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-container {
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container img {
            max-width: 200px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .form-title {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 10px;
            font-weight: 700;
            text-align: center;
        }

        .form-subtitle {
            color: var(--text-gray);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(107, 163, 163, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-dark);
            border: 2px solid var(--border-color);
            margin-top: 10px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--border-color);
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid var(--danger-color);
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid var(--success-color);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-toggle {
            text-align: center;
            margin-top: 20px;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .form-toggle a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .form-toggle a:hover {
            text-decoration: underline;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle input {
            padding-right: 40px;
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-gray);
            font-size: 1.2rem;
        }

        .hidden-form {
            display: none;
        }

        .visible-form {
            display: block;
        }

        /* DASHBOARD STYLES */
        .dashboard-screen {
            display: none;
        }

        .dashboard-screen.visible {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: var(--bg-white);
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content {
            flex: 1;
            text-align: center;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 300px;
            height: auto;
            display: inline-block;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 8px;
            font-weight: 700;
            display: none;
        }

        .header p {
            color: var(--text-gray);
            font-size: 1rem;
        }

        .card {
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            padding: 30px;
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 20px;
            font-weight: 600;
            border-left: 4px solid var(--primary-color);
            padding-left: 12px;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .progress-container {
            display: none;
            margin-bottom: 20px;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--success-color));
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-top: 8px;
            text-align: center;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-white);
        }

        thead {
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-dark);
        }

        tbody tr:hover {
            background: var(--bg-light);
        }

        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        .text-muted {
            color: var(--text-gray);
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #f0f9f9, #e0f2f2);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .summary-card.success {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border-left-color: var(--success-color);
        }

        .summary-label {
            font-size: 0.85rem;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .summary-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .summary-card.success .summary-value {
            color: var(--success-color);
        }

        .text-success {
            color: var(--success-color);
        }

        .font-mono {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header-content {
                width: 100%;
            }

            .logout-btn {
                width: 100%;
            }

            .logo-container img {
                max-width: 200px;
            }

            .card {
                padding: 20px;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .filter-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            th, td {
                padding: 12px 8px;
                font-size: 0.9rem;
            }

            .summary {
                grid-template-columns: 1fr;
            }

            .summary-value {
                font-size: 1.5rem;
            }

            .login-container {
                padding: 30px 20px;
            }

            .form-title {
                font-size: 1.25rem;
            }

            .logo-container img {
                max-width: 150px;
            }
        }
    </style>
</head>

    <script>
        // ===== CONFIGURAÇÕES DE LOGIN =====
        const SESSION_TIMEOUT = 30 * 60 * 1000;
        const STORAGE_KEY = 'best_ice_users';
        const SESSION_KEY = 'best_ice_session';
        const LAST_ACTIVITY_KEY = 'best_ice_last_activity';

        // ===== ADICIONE SEUS USUARIOS AQUI =====
        // Exemplo: { usuario: 'nome', senha: 'senha123' }
        // A senha sera criptografada automaticamente
        const USUARIOS_PREDEFINIDOS = [
            { usuario: 'roberto', senha: 'Ro14189061' },
            // Adicione mais usuarios aqui conforme necessario:
            // { usuario: 'maria', senha: 'senha123' },
            // { usuario: 'joao', senha: 'senha456' },
        ];

        // Inicializar usuarios padrao
        function inicializarUsuarios() {
            const usuarios = obterUsuarios();
            if (usuarios.length === 0) {
                const usuariosComHash = USUARIOS_PREDEFINIDOS.map(u => ({
                    usuario: u.usuario,
                    senha: CryptoJS.SHA256(u.senha).toString(),
                    dataCriacao: new Date().toISOString()
                }));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(usuariosComHash));
            }
        }

        function obterUsuarios() {
            const dados = localStorage.getItem(STORAGE_KEY);
            return dados ? JSON.parse(dados) : [];
        }

        function salvarUsuarios(usuarios) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(usuarios));
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function mostrarAlerta(mensagem, tipo = 'error', formId = 'alertLogin') {
            const alertDiv = document.getElementById(formId);
            alertDiv.textContent = mensagem;
            alertDiv.className = `alert show alert-${tipo}`;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        function fazerLogin(event) {
            event.preventDefault();

            const usuario = document.getElementById('loginUsuario').value;
            const senha = document.getElementById('loginSenha').value;

            const usuarios = obterUsuarios();
            const usuarioEncontrado = usuarios.find(u => u.usuario === usuario);

            if (!usuarioEncontrado) {
                mostrarAlerta('Usuário não encontrado!', 'error', 'alertLogin');
                return;
            }

            const senhaHash = CryptoJS.SHA256(senha).toString();
            if (usuarioEncontrado.senha !== senhaHash) {
                mostrarAlerta('Senha incorreta!', 'error', 'alertLogin');
                return;
            }

            const sessao = {
                usuario: usuario,
                token: CryptoJS.SHA256(usuario + new Date().getTime()).toString(),
                dataCriacao: new Date().getTime()
            };

            localStorage.setItem(SESSION_KEY, JSON.stringify(sessao));
            localStorage.setItem(LAST_ACTIVITY_KEY, new Date().getTime());

            mostrarAlerta('Login realizado com sucesso!', 'success', 'alertLogin');

            setTimeout(() => {
                mostrarDashboard();
            }, 1000);
        }

        function mostrarLogin() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.remove('visible');
        }

        function mostrarDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.add('visible');
            inicializarDatas();
        }

        function mostrarLogin() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.remove('visible');
        }

        function fazerLogout() {
            if (confirm('Tem certeza que deseja sair?')) {
                localStorage.removeItem(SESSION_KEY);
                localStorage.removeItem(LAST_ACTIVITY_KEY);
                mostrarLogin();
                document.getElementById('loginForm').reset();
            }
        }

        function verificarAutenticacao() {
            const sessao = localStorage.getItem(SESSION_KEY);
            const lastActivity = localStorage.getItem(LAST_ACTIVITY_KEY);
            
            if (!sessao) {
                mostrarLogin();
                return;
            }

            const agora = new Date().getTime();
            const ultimaAtividade = parseInt(lastActivity);
            const tempoInativo = agora - ultimaAtividade;
            
            if (tempoInativo > SESSION_TIMEOUT) {
                localStorage.removeItem(SESSION_KEY);
                localStorage.removeItem(LAST_ACTIVITY_KEY);
                alert('Sua sessão expirou. Faça login novamente.');
                mostrarLogin();
                return;
            }
            
            localStorage.setItem(LAST_ACTIVITY_KEY, agora);
            mostrarDashboard();
        }

        // ===== CONFIGURAÇÕES DA API UNIPLUS =====
        const CONFIG = {
            AUTH_CODE: 'NTgzOTMxODQwMDAxODc6MmY5YjYxN2ItZDI0YS00Nzg4LTgyZDItY2I2Y2ZlMGY2NzA0',
            ACCOUNT_NAME: '58393184000187',
            API_URL: 'https://virtual-01.webuniplus.com/public-api/v2/venda'
        };

        let tokenCache = {
            access_token: null,
            expires_at: 0
        };

        const dataInicio = document.getElementById('dataInicio');
        const dataFim = document.getElementById('dataFim');
        const btnConsultar = document.getElementById('btnConsultar');
        const btnLimpar = document.getElementById('btnLimpar');
        const tabelaCorpo = document.getElementById('tabelaCorpo');
        const alertDiv = document.getElementById('alert');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const summary = document.getElementById('summary');
        const totalVendas = document.getElementById('totalVendas');
        const valorTotal = document.getElementById('valorTotal');

        function inicializarDatas() {
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            const dataFormatada = `${ano}-${mes}-${dia}`;
            
            dataInicio.value = dataFormatada;
            dataFim.value = dataFormatada;
        }

        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        function formatarData(dataStr) {
            const [ano, mes, dia] = dataStr.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        async function obterToken() {
            if (tokenCache.access_token && new Date().getTime() < tokenCache.expires_at) {
                return tokenCache.access_token;
            }

            try {
                const url = 'https://virtual-01.webuniplus.com/oauth/token';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Basic ${CONFIG.AUTH_CODE}`,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials&scope=public-api'
                });

                if (!response.ok) {
                    throw new Error(`Erro ao obter token: ${response.status}`);
                }

                const dados = await response.json();
                tokenCache.access_token = dados.access_token;
                tokenCache.expires_at = new Date().getTime() + (dados.expires_in * 1000) - 300000;

                return tokenCache.access_token;
            } catch (erro) {
                throw new Error(`Falha na autenticação: ${erro.message}`);
            }
        }

        async function buscarVendasDia(data) {
            try {
                const token = await obterToken();
                const response = await fetch(`${CONFIG.API_URL}?emissao=${data}&limit=100`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Erro HTTP ${response.status}`);
                }

                return await response.json();
            } catch (erro) {
                console.warn(`Erro ao buscar ${data}:`, erro);
                return [];
            }
        }

        async function buscarVendas() {
            const inicio = dataInicio.value;
            const fim = dataFim.value;

            if (!inicio || !fim) {
                mostrarAlerta('Preencha as datas inicial e final', 'warning');
                return;
            }

            const dataInícioObj = new Date(inicio);
            const dataFimObj = new Date(fim);

            if (dataInícioObj > dataFimObj) {
                mostrarAlerta('Data inicial não pode ser maior que a final', 'error');
                return;
            }

            btnConsultar.disabled = true;
            progressContainer.classList.add('active');
            tabelaCorpo.innerHTML = '';
            summary.style.display = 'none';

            let totalVendasCount = 0;
            let totalValor = 0;
            const vendas = [];

            const diffTime = Math.abs(dataFimObj - dataInícioObj);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

            let diaAtual = new Date(dataInícioObj);

            try {
                for (let i = 0; i < diffDays; i++) {
                    const dataStr = diaAtual.toISOString().split('T')[0];
                    
                    const vendasDia = await buscarVendasDia(dataStr);
                    vendas.push(...vendasDia);

                    diaAtual.setDate(diaAtual.getDate() + 1);
                    progressFill.style.width = ((i + 1) / diffDays * 100) + '%';
                    progressText.textContent = `Consultando ${dataStr}... (${i + 1}/${diffDays})`;
                }

                if (vendas.length === 0) {
                    tabelaCorpo.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhuma venda encontrada para este período.</td></tr>';
                } else {
                    vendas.forEach(venda => {
                        const valor = parseFloat(venda.valorTotal || 0);
                        totalValor += valor;
                        totalVendasCount++;

                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="font-mono">${venda.documento}</td>
                            <td>${formatarData(venda.emissao)}</td>
                            <td>${venda.nomeCliente || 'Consumidor Final'}</td>
                            <td class="text-right text-success">${formatarMoeda(valor)}</td>
                        `;
                        tabelaCorpo.appendChild(row);
                    });

                    totalVendas.textContent = totalVendasCount.toLocaleString('pt-BR');
                    valorTotal.textContent = formatarMoeda(totalValor);
                    summary.style.display = 'grid';

                    mostrarAlerta(`${totalVendasCount} venda(s) encontrada(s)!`, 'success');
                }
            } catch (erro) {
                mostrarAlerta(`Erro ao consultar vendas: ${erro.message}`, 'error');
                console.error(erro);
            } finally {
                btnConsultar.disabled = false;
                progressContainer.classList.remove('active');
                progressFill.style.width = '0%';
            }
        }

        function limpar() {
            tabelaCorpo.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Selecione um período e clique em "Consultar Vendas" para visualizar os resultados.</td></tr>';
            summary.style.display = 'none';
            alertDiv.classList.remove('show');
            inicializarDatas();
        }

        btnConsultar.addEventListener('click', buscarVendas);
        btnLimpar.addEventListener('click', limpar);

        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker registrado com sucesso!');
                    })
                    .catch((error) => {
                        console.log('⚠️ Service Worker não disponível:', error);
                    });
            });
        }

        // Inicializar
        inicializarUsuarios();
        verificarAutenticacao();
    </script>
</body>
</html>
