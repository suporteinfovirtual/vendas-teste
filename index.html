<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniplus - Consulta de Vendas</title>
    <meta name="description" content="Dashboard de consulta de vendas Uniplus Web em tempo real">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Uniplus Vendas">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232563eb' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>📊</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --primary-dark: #1e40af;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --bg-light: #f9fafb;
            --bg-white: #ffffff;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: var(--bg-white);
            padding: 30px 0;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-gray);
            font-size: 1rem;
        }

        /* Card */
        .card {
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            padding: 30px;
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        /* Filter Section */
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Button */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin-bottom: 20px;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--success-color));
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-top: 8px;
            text-align: center;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-white);
        }

        thead {
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-dark);
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: var(--bg-light);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        .text-muted {
            color: var(--text-gray);
        }

        /* Summary */
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .summary-card.success {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border-left-color: var(--success-color);
        }

        .summary-label {
            font-size: 0.85rem;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .summary-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .summary-card.success .summary-value {
            color: var(--success-color);
        }

        /* Alert */
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid var(--danger-color);
        }

        .alert-warning {
            background: #fef3c7;
            color: #92400e;
            border-left: 4px solid var(--warning-color);
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid var(--success-color);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .card {
                padding: 20px;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .filter-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            th, td {
                padding: 12px 8px;
                font-size: 0.9rem;
            }

            .summary {
                grid-template-columns: 1fr;
            }

            .summary-value {
                font-size: 1.5rem;
            }
        }

        .text-success {
            color: var(--success-color);
        }

        .font-mono {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Uniplus Vendas</h1>
            <p>Consulta de Vendas em Tempo Real</p>
        </div>

        <div class="card">
            <div class="card-title">Filtros de Consulta</div>

            <div id="alert" class="alert"></div>

            <div class="filters">
                <div class="form-group">
                    <label for="dataInicio">Data Inicial</label>
                    <input type="date" id="dataInicio" required>
                </div>
                <div class="form-group">
                    <label for="dataFim">Data Final</label>
                    <input type="date" id="dataFim" required>
                </div>
            </div>

            <div class="filter-actions">
                <button class="btn btn-primary" id="btnConsultar">
                    <span>🔍</span>
                    <span>Consultar Vendas</span>
                </button>
                <button class="btn btn-primary" id="btnLimpar" style="background: #6b7280;">
                    <span>🗑️</span>
                    <span>Limpar</span>
                </button>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Carregando...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Resultados</div>

            <div class="table-container">
                <table id="tabelaVendas">
                    <thead>
                        <tr>
                            <th>Documento</th>
                            <th>Data Emissão</th>
                            <th>Cliente</th>
                            <th class="text-right">Valor Total</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                        <tr>
                            <td colspan="4" class="text-center text-muted">
                                Selecione um período e clique em "Consultar Vendas" para visualizar os resultados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="summary" id="summary" style="display: none;">
                <div class="summary-card">
                    <div class="summary-label">Total de Vendas</div>
                    <div class="summary-value" id="totalVendas">0</div>
                </div>
                <div class="summary-card success">
                    <div class="summary-label">Valor Total</div>
                    <div class="summary-value" id="valorTotal">R$ 0,00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Criar e registrar Service Worker dinamicamente
        const swCode = `
const CACHE_NAME = 'uniplus-vendas-v1';
const urlsToCache = ['/vendas-teste/', '/vendas-teste/index.html'];

self.addEventListener('install', (event) => {
  event.waitUntil(
    caches.open(CACHE_NAME).then((cache) => {
      console.log('✅ Cache criado');
      return cache.addAll(urlsToCache);
    }).catch(() => console.log('⚠️ Cache offline indisponível'))
  );
  self.skipWaiting();
});

self.addEventListener('activate', (event) => {
  event.waitUntil(
    caches.keys().then((cacheNames) => {
      return Promise.all(
        cacheNames.map((cacheName) => {
          if (cacheName !== CACHE_NAME) {
            return caches.delete(cacheName);
          }
        })
      );
    })
  );
  self.clients.claim();
});

self.addEventListener('fetch', (event) => {
  if (event.request.method !== 'GET') return;
  if (event.request.url.includes('localhost')) return;

  event.respondWith(
    caches.match(event.request).then((response) => {
      if (response) return response;
      return fetch(event.request).then((response) => {
        if (!response || response.status !== 200) return response;
        const responseToCache = response.clone();
        caches.open(CACHE_NAME).then((cache) => {
          cache.put(event.request, responseToCache);
        });
        return response;
      });
    }).catch(() => {
      return caches.match(event.request);
    })
  );
});
`;

        // Registrar Service Worker como blob
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                navigator.serviceWorker.register(swUrl)
                    .then((registration) => {
                        console.log('✅ Service Worker registrado com sucesso!');
                    })
                    .catch((error) => {
                        console.log('⚠️ Service Worker não disponível:', error);
                    });
            });
        }

        // Criar manifest dinamicamente
        const manifest = {
            name: "Uniplus Vendas - Dashboard de Vendas",
            short_name: "Uniplus Vendas",
            description: "Consulta de vendas em tempo real da API Uniplus Web",
            start_url: "/vendas-teste/",
            scope: "/vendas-teste/",
            display: "standalone",
            orientation: "portrait-primary",
            theme_color: "#2563eb",
            background_color: "#ffffff",
            icons: [
                {
                    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232563eb' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>📊</text></svg>",
                    sizes: "192x192",
                    type: "image/svg+xml",
                    purpose: "any"
                },
                {
                    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect fill='%232563eb' width='512' height='512'/><text x='50%' y='50%' font-size='300' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>📊</text></svg>",
                    sizes: "512x512",
                    type: "image/svg+xml",
                    purpose: "any maskable"
                }
            ]
        };

        // Adicionar manifest dinamicamente
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
        document.head.appendChild(manifestLink);
    </script>

    <script>
        // Configurações da API Uniplus
        const CONFIG = {
            AUTH_CODE: 'NTgzOTMxODQwMDAxODc6MmY5YjYxN2ItZDI0YS00Nzg4LTgyZDItY2I2Y2ZlMGY2NzA0',
            ACCOUNT_NAME: '58393184000187',
            API_URL: 'https://virtual-01.webuniplus.com/public-api/v2/venda'
        };

        // Cache de token
        let tokenCache = {
            access_token: null,
            expires_at: 0
        };

        // Elementos do DOM
        const dataInicio = document.getElementById('dataInicio');
        const dataFim = document.getElementById('dataFim');
        const btnConsultar = document.getElementById('btnConsultar');
        const btnLimpar = document.getElementById('btnLimpar');
        const tabelaCorpo = document.getElementById('tabelaCorpo');
        const alertDiv = document.getElementById('alert');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const summary = document.getElementById('summary');
        const totalVendas = document.getElementById('totalVendas');
        const valorTotal = document.getElementById('valorTotal');

        // Inicializar datas
        function inicializarDatas() {
            const hoje = new Date();
            const umDiaAtras = new Date(hoje);
            umDiaAtras.setDate(umDiaAtras.getDate() - 1);

            dataFim.valueAsDate = hoje;
            dataInicio.valueAsDate = umDiaAtras;
        }

        // Mostrar alerta
        function mostrarAlerta(mensagem, tipo = 'error') {
            alertDiv.textContent = mensagem;
            alertDiv.className = `alert show alert-${tipo}`;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        // Formatar moeda
        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        // Formatar data
        function formatarData(dataStr) {
            const [ano, mes, dia] = dataStr.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        // Obter token OAuth2
        async function obterToken() {
            if (tokenCache.access_token && new Date().getTime() < tokenCache.expires_at) {
                return tokenCache.access_token;
            }

            try {
                const url = 'https://virtual-01.webuniplus.com/oauth/token';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Basic ${CONFIG.AUTH_CODE}`,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials&scope=public-api'
                });

                if (!response.ok) {
                    throw new Error(`Erro ao obter token: ${response.status}`);
                }

                const dados = await response.json();
                tokenCache.access_token = dados.access_token;
                tokenCache.expires_at = new Date().getTime() + (dados.expires_in * 1000) - 300000;

                return tokenCache.access_token;
            } catch (erro) {
                throw new Error(`Falha na autenticação: ${erro.message}`);
            }
        }

        // Buscar vendas de um dia
        async function buscarVendasDia(data) {
            try {
                const token = await obterToken();
                const response = await fetch(`${CONFIG.API_URL}?emissao=${data}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Erro HTTP ${response.status}`);
                }

                return await response.json();
            } catch (erro) {
                console.warn(`Erro ao buscar ${data}:`, erro);
                return [];
            }
        }

        // Buscar vendas
        async function buscarVendas() {
            const inicio = dataInicio.value;
            const fim = dataFim.value;

            if (!inicio || !fim) {
                mostrarAlerta('Preencha as datas inicial e final', 'warning');
                return;
            }

            const dataInícioObj = new Date(inicio);
            const dataFimObj = new Date(fim);

            if (dataInícioObj > dataFimObj) {
                mostrarAlerta('Data inicial não pode ser maior que a final', 'error');
                return;
            }

            btnConsultar.disabled = true;
            progressContainer.classList.add('active');
            tabelaCorpo.innerHTML = '';
            summary.style.display = 'none';

            let totalVendasCount = 0;
            let totalValor = 0;
            const vendas = [];

            // Calcular número de dias
            const diffTime = Math.abs(dataFimObj - dataInícioObj);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

            let diaAtual = new Date(dataInícioObj);

            try {
                for (let i = 0; i < diffDays; i++) {
                    const dataStr = diaAtual.toISOString().split('T')[0];
                    
                    const vendasDia = await buscarVendasDia(dataStr);
                    vendas.push(...vendasDia);

                    diaAtual.setDate(diaAtual.getDate() + 1);
                    progressFill.style.width = ((i + 1) / diffDays * 100) + '%';
                    progressText.textContent = `Consultando ${dataStr}... (${i + 1}/${diffDays})`;
                }

                // Renderizar tabela
                if (vendas.length === 0) {
                    tabelaCorpo.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhuma venda encontrada para este período.</td></tr>';
                } else {
                    vendas.forEach(venda => {
                        const valor = parseFloat(venda.valorTotal || 0);
                        totalValor += valor;
                        totalVendasCount++;

                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="font-mono">${venda.documento}</td>
                            <td>${formatarData(venda.emissao)}</td>
                            <td>${venda.nomeCliente || 'Consumidor Final'}</td>
                            <td class="text-right text-success">${formatarMoeda(valor)}</td>
                        `;
                        tabelaCorpo.appendChild(row);
                    });

                    // Mostrar resumo
                    totalVendas.textContent = totalVendasCount.toLocaleString('pt-BR');
                    valorTotal.textContent = formatarMoeda(totalValor);
                    summary.style.display = 'grid';

                    mostrarAlerta(`${totalVendasCount} venda(s) encontrada(s)!`, 'success');
                }
            } catch (erro) {
                mostrarAlerta(`Erro ao consultar vendas: ${erro.message}`, 'error');
                console.error(erro);
            } finally {
                btnConsultar.disabled = false;
                progressContainer.classList.remove('active');
                progressFill.style.width = '0%';
            }
        }

        // Limpar
        function limpar() {
            tabelaCorpo.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Selecione um período e clique em "Consultar Vendas" para visualizar os resultados.</td></tr>';
            summary.style.display = 'none';
            alertDiv.classList.remove('show');
            inicializarDatas();
        }

        // Event listeners
        btnConsultar.addEventListener('click', buscarVendas);
        btnLimpar.addEventListener('click', limpar);

        // Inicializar
        inicializarDatas();
    </script>
</body>
</html>
